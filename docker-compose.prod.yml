# Production stack for VPS deployment.
#
# External services: Neon (Postgres) + Upstash (Redis)
# Start with 3 API replicas:
#   docker compose -f docker-compose.prod.yml up -d --scale api=3
#
# Copy .env.prod.example to .env and fill in the values before starting.

x-api-environment: &api-environment
  NODE_ENV: production
  PORT: "3333"
  HOST: 0.0.0.0
  DATABASE_URL: ${DATABASE_URL}
  REDIS_URL: ${REDIS_URL}
  AUTH_SECRET: ${AUTH_SECRET}
  BETTER_AUTH_URL: ${BETTER_AUTH_URL}
  CLIENT_ORIGIN: ${CLIENT_ORIGIN}
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
  GEMINI_API_KEY: ${GEMINI_API_KEY}
  OTEL_LOGS_EXPORTER: none
  OTEL_TRACES_EXPORTER: otlp
  OTEL_METRICS_EXPORTER: otlp
  OTEL_EXPORTER_OTLP_PROTOCOL: grpc
  OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: http://opentelemetry-collector:4317
  RESEND_API_KEY: ${RESEND_API_KEY:-}

services:
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    environment:
      DATABASE_URL: ${DATABASE_URL}
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    expose:
      - "3333"
    environment:
      <<: *api-environment
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      opentelemetry-collector:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3333/health-check').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    depends_on:
      - api

  opentelemetry-collector:
    hostname: opentelemetry-collector
    image: otel/opentelemetry-collector:latest
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./infra/otel-collector-config.yml:/etc/otel-collector-config.yml
    restart: unless-stopped
    environment:
      - DEPLOY_ENV=prod
    expose:
      - "4317"
      - "8889"
    depends_on:
      - prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./data/grafana-data:/var/lib/grafana
      - /etc/localtime:/etc/localtime:ro
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=${GRAFANA_ANONYMOUS_AUTH:-false}
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_INSTALL_PLUGINS=https://storage.googleapis.com/integration-artifacts/grafana-exploretraces-app/grafana-exploretraces-app-latest.zip;grafana-traces-app
    restart: unless-stopped
    depends_on:
      - opentelemetry-collector
      - prometheus

  prometheus:
    image: prom/prometheus:latest
    command:
      - --config.file=/etc/prometheus.yaml
      - --web.enable-remote-write-receiver
      - --enable-feature=otlp-write-receiver
      - --enable-feature=exemplar-storage
      - --enable-feature=native-histograms
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus.yaml
      - /etc/localtime:/etc/localtime:ro
      - ./data/prometheus-data:/prometheus
    expose:
      - "9090"
    restart: unless-stopped
